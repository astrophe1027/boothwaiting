spring.application.name=boothwaiting

spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver

spring.h2.console.enabled=true

spring.quartz.job-store-type=jdbc
spring.quartz.jdbc.initialize-schema=always

# ── 부스 설정 ──────────────────────────────────────
# 최대 동시 입장 인원 (WaitingUpdateService)
booth.max-capacity=2

# 호출 후 미입장 시 자동 취소까지 걸리는 시간 (분) (CancelEntryJob / WaitingUpdateService)
booth.call-timeout-minutes=3

# 입장 후 자동 퇴장까지 걸리는 시간 (분) (AccountService)
booth.exit-timeout-minutes=60

# 앞에 n명 남았을 때 이동 안내 메세지를 보낼 순번 (WaitingUpdateService)
booth.approach-notify-count=3