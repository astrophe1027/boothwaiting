<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>입장 확인증</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        /* 1. 배경 그라데이션과 전체 톤 조절 */
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        /* 2. 티켓 형태의 카드 디자인 */
        article {
            width: 100%;
            max-width: 400px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            overflow: hidden;
            border: none;
            background: white;
        }

        header {
            background-color: var(--pico-primary-background) !important;
            color: white !important;
            text-align: center;
            padding: 1.5rem !important;
        }

        header h2 {
            margin: 0;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        /* 3. 바코드 영역 강조 */
        .qrcode-container {
            text-align: center;
            padding: 2rem 1rem;
            background: white;
            position: relative;
        }

        /* 티켓 절취선 느낌의 효과 */
        .qrcode-container::before, .barcode-container::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: #cbd5e1; /* 배경색과 맞춤 */
            border-radius: 50%;
            top: -10px;
        }
        .qrcode-container::before { left: -10px; }
        .qrcode-container::after { right: -10px; }

        #qrcode {
            max-width: 100%;
            height: auto;

            display: flex;
            justify-content: center; /* 가로 기준 가운데 정렬 */
        }

        footer {
            background-color: #f8fafc !important;
            text-align: center;
            padding: 1rem !important;
        }
    </style>
</head>
<body>

<main class="container">
    <article>
        <header>
            <h2>ENTRY PASS</h2>
        </header>

        <div>
            <div class="qrcode-container">
                <mark th:if="${id} == -1">잘못된 페이지입니다.</mark>
                <div id="qrcode"></div><br>
                <strong  th:if="${id} != -1">입장시 필요한 바코드입니다.</strong>
            </div>

            <footer  th:if="${id} != -1">
                <small style="color: #64748b;">입장 시 스태프에게 보여주세요.</small><br>
                <small style="color: #64748b;">스캔시 자동으로 입장이 확인됩니다.</small>
            </footer>
        </div>
    </article>
</main>

<script>
    // 페이지 로드 시 QR코드 생성
    window.addEventListener("DOMContentLoaded", function() {
        const qrContainer = document.getElementById("qrcode");

        // 기존에 잔여 QR이 남아있을 경우를 대비해 초기화
        qrContainer.innerHTML = "";

        new QRCode(qrContainer, {
            text: "[[${token}]]",        // QR코드에 담을 데이터 (서버 토큰)
            width: 150,                  // 가로 크기 (픽셀)
            height: 150,                 // 세로 크기 (픽셀)
            colorDark: "#1a1a1a",        // QR코드 내부 선/점 색상
            colorLight: "#ffffff",       // QR코드 배경 색상
            correctLevel: QRCode.CorrectLevel.H // 오류 복구 레벨 (L, M, Q, H - H가 가장 높음)
        });
    });
</script>
</body>
</html>
