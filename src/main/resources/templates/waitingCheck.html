<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대기열 등록</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script>
        const autoHyphen = (target) => {
            target.value = target.value
                .replace(/[^0-9]/g, '') // 숫자가 아닌 문자 제거
                .replace(/^(\d{0,3})(\d{0,4})(\d{0,4})$/g, "$1-$2-$3") // 3-4-4 구조로 나눔
                .replace(/(\-{1,2})$/g, ""); // 마지막에 남는 하이픈 제거
        }
    </script>
    <style>
        /* 기본 정렬: 상단에서 10% 정도 떨어진 지점부터 시작 */
        body {
            display: flex;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 2rem 1rem;
        }
        main {
            width: 100%;
            max-width: 500px;
            margin-top: 5vh; /* 화면 상단에서 살짝만 띄움 */
        }
        #response-message {
            margin-top: 1rem;
            text-align: center;
        }
        input, button {
            font-size: 16px !important;
        }
    </style>
</head>
<body>

<main class="container">
    <article>
        <header>
            <h2 style="margin-bottom: 0;">📋 대기열 등록</h2>
        </header>
        <div id="response-message">
            <div th:fragment="registerResponse">
                <ins th:if="${id} != -1">[[${message}]]</ins>
                <mark th:if="${id} == -1">[[${message}]]</mark>
                <div th:if="${id} != -1" class="grid" style="margin-top: 1rem;">
                    <div>
                        <small>대기 번호</small>
                        <h2 style="color: var(--pico-primary);">[[${id}]]</h2>
                    </div>
                    <div>
                        <small>내 앞 대기</small>
                        <h2 th:if="${number} != -1">[[${number}]]팀</h2>
                        <h3 th:if="${number} == -1">현재 대기 팀이 없습니다. <br> 바로 부스로 이동해주세요.</h3>
                    </div>
                </div>
                <hr> <div class="extra-info">
                    <p style="margin-bottom: 0.5rem;">
                        <strong>📌 안내 사항</strong><br>
                        <small>입장 순서가 되면 카카오톡 알림을 드립니다. <br>
                            알림 후 5분 내 미방문 시 대기가 자동 취소될 수 있습니다.</small>
                    </p>
                    <p style="margin-bottom: 0.5rem;" th:if="${id} == -1">
                        <small>이미 호출 되신 경우엔 등록되지 않은 학번이라 뜰 수 있습니다.</small>
                    </p>
                </div>
                <hr> <div class="extra-info">
                <p style="margin-bottom: 0.5rem;" th:if="${id} != -1">
                    아래 링크를 눌러 복사 후 보관하여<br>페이지를 닫아도 순번을 확인할 수 있게 해주세요
                </p>
                <div style="background: var(--pico-card-background-color); padding: 0.4rem 0.6rem; border-radius: 5px; margin: 0 0 1rem 0; line-height: 1.2;">
                    <a href="javascript:void(0);"
                       id="shareUrl"
                       onclick="copyToClipboard()"
                       style="display: block; cursor: pointer; text-decoration: underline; word-break: break-all; font-size: 0.9rem; font-weight: bold; color: var(--pico-primary);">
                        [[${url}]]
                    </a>
                </div>
            </div>
                <script>
                    alert("[[${message}]]");
                </script>
                <script th:if="${number} == -1 and ${id} != -1">
                    alert("현재 대기 팀이 없습니다.\n바로 부스로 이동해주세요.");
                </script>
                <script>
                    function copyToClipboard() {
                        const url = document.getElementById('shareUrl').innerText;
                        navigator.clipboard.writeText(url).then(() => {
                            alert("링크가 복사되었습니다.");
                        });
                    }
                </script>
            </div>
        </div>
    </article>
</main>

</body>
</html>
