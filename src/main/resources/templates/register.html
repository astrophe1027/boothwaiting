<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대기열 등록</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script>
        const autoHyphen = (target) => {
            target.value = target.value
                .replace(/[^0-9]/g, '') // 숫자가 아닌 문자 제거
                .replace(/^(\d{0,3})(\d{0,4})(\d{0,4})$/g, "$1-$2-$3") // 3-4-4 구조로 나눔
                .replace(/(\-{1,2})$/g, ""); // 마지막에 남는 하이픈 제거
        }
    </script>
    <style>
        /* 기본 정렬: 상단에서 10% 정도 떨어진 지점부터 시작 */
        body {
            display: flex;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 2rem 1rem;
        }
        main {
            width: 100%;
            max-width: 500px;
            margin-top: 5vh; /* 화면 상단에서 살짝만 띄움 */
        }
        #response-message {
            margin-top: 1rem;
            text-align: center;
        }
        input, button {
            font-size: 16px !important;
        }
    </style>
</head>
<body>

<main class="container">
    <article>
        <header>
            <h2 style="margin-bottom: 0;">📋 대기열 등록</h2>
        </header>
        <div id="response-message">
            <form hx-post="/api/waiting" hx-target="#response-message" hx-swap="innerHTML">

                <label for="name">이름
                    <input type="text" id="name" name="name" placeholder="이름을 입력하세요" required>
                </label>

                <label for="studentId">학번 (5자리)
                    <input type="text"
                           id="studentId"
                           name="studentId"
                           placeholder="12345"
                           pattern="\d{5}"
                           maxlength="5"
                           inputmode="numeric"
                           title="숫자 5자리를 입력해주세요"
                           required>
                </label>

                <label for="phoneNumber">전화번호
                    <input type="tel"
                           id="phoneNumber"
                           name="phoneNumber"
                           placeholder="010-0000-0000"
                           inputmode="tel"
                           autocomplete="tel"
                           maxlength="13"
                           oninput="autoHyphen(this)"
                           onchange="autoHyphen(this)"
                           required>
                </label>

                <button type="submit">등록하기</button>
            </form>
        </div>
    </article>
</main>

</body>
</html>
