<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대기열 등록</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <script>
        const autoHyphen = (target) => {
            let val = target.value.replace(/[^0-9]/g, '');
            let result = '';
            if (val.length < 4) {
                result = val;
            } else if (val.length < 8) {
                result = val.substring(0, 3) + "-" + val.substring(3);
            } else {
                result = val.substring(0, 3) + "-" + val.substring(3, val.length - 4) + "-" + val.substring(val.length - 4);
            }
            target.value = result.substring(0, 13);
        };
    </script>
    <style>
        body {
            display: flex;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 2rem 1rem;
        }
        main {
            width: 100%;
            max-width: 500px;
            margin-top: 5vh;
        }
        #response-message {
            margin-top: 1rem;
            text-align: center;
        }
        input, button {
            font-size: 16px !important;
        }
    </style>
</head>
<body>

<main class="container">
    <article>

        <header>
            <h2 style="margin-bottom: 0;">📋 대기열 등록</h2>
        </header>

        <form id="waitingForm">

            <label for="name">이름
                <input type="text" id="name" name="name" placeholder="이름을 입력하세요" required>
            </label>

            <label for="studentId">학번 (5자리)
                <input type="text"
                       id="studentId"
                       name="studentId"
                       placeholder="12345"
                       pattern="\d{5}"
                       maxlength="5"
                       inputmode="numeric"
                       title="학번 5자리를 입력해주세요"
                       required>
            </label>

            <label for="phoneNumber">전화번호
                <input type="tel"
                       id="phoneNumber"
                       name="phoneNumber"
                       placeholder="010-0000-0000"
                       pattern="^\d{3}-\d{3,4}-\d{4}$"
                       inputmode="tel"
                       autocomplete="tel"
                       maxlength="13"
                       oninput="autoHyphen(this)"
                       onchange="autoHyphen(this)"
                       required>
            </label>

            <button type="submit">등록하기</button>

        </form>
    </article>
</main>

<script>
    document.getElementById('waitingForm').addEventListener('submit', async function(e) {

        e.preventDefault();

        const data = Object.fromEntries(new FormData(this));

        try {
            const response = await fetch('/api/waiting', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            });

            if (!response.ok) {
                alert(await response.text());
            } else if (response.redirected) {
                window.location.href = response.url;
            }
        } catch (error) {
            if (error.response) {
                alert(error.response.data);
            } else {
                alert('네트워크 오류가 발생했습니다.');
            }
        }
    });
</script>
</body>
</html>
